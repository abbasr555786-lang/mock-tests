      <!-- ============ FAQ ============ -->

        <div class="lp-section__inner lp-faq">
          <p class="lp-eyebrow">Questions</p>
          <h2 class="lp-h2">Frequently asked</h2>
          <details class="lp-qa">
            <summary>Are these the actual JMI entrance papers?</summary>
            <p>Yes. Every full-length paper is digitised from a real JMI entrance booklet — we keep the original
            paper code and set, preserve the section order and marking scheme, and verify every answer. Where an
            official key is unreliable, the question is clearly flagged.</p>
          </details>
          <details class="lp-qa">
            <summary>Is JamiaPrep really free?</summary>
            <p>Yes — every paper is free. You only need to sign in (Google) so your attempts and scores are saved.</p>
          </details>
          <details class="lp-qa">
            <summary>Which programmes are covered?</summary>
            <p>JMI MBA, MCA and BA LLB (Hons.) entrance tracks are live today, with more programmes being digitised.
            Each track shows exactly how many papers it currently has.</p>
          </details>
          <details class="lp-qa">
            <summary>Is the JMI entrance online or offline?</summary>
            <p>JMI conducts its entrance exams <b>offline</b>, on paper with an OMR sheet. JamiaPrep is a digital
            practice platform — you attempt the real previous-year papers on screen with a sectional timer, then
            get instant scoring and a full answer review. The on-screen format differs from exam day, but the
            questions, sections and marking scheme are the real thing, so you practise exactly what will be asked.</p>
          </details>
          <details class="lp-qa">
            <summary>Is JamiaPrep affiliated with Jamia Millia Islamia?</summary>
            <p>No. JamiaPrep is an independent, community-run practice platform for JMI aspirants. It is not endorsed
            by or affiliated with Jamia Millia Islamia. For admissions, always refer to
            <a href="https://admission.jmi.ac.in" target="_blank" rel="noopener">admission.jmi.ac.in</a>.</p>
          </details>
        </div>
      </section>
